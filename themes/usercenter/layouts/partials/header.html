<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{ if eq .Title .Site.Title }}
    <title>{{ T "account_settings" | default "账号设置" }} | {{ .Site.Title }}</title>
    <meta name="description" content="{{ $.Site.Params.description }}">
    {{ else }}
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <meta name="description" content="{{ .Params.description }}">
    {{ end }}
    <meta name="author" content="{{ $.Site.Params.author }}" />
    <meta name="copyright" content="{{ $.Site.Params.author }}" />
    <meta name="image" content="{{ absURL $.Site.Params.images.favicon }}">
    <link rel="icon" type="image/png" href="{{ absURL $.Site.Params.images.favicon }}">
    <link href="https://fonts.cat.net/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.cat.net/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ absURL "css/common.css"}}?v=4">
    {{ if eq .Layout "login" }}
    <link rel="stylesheet" href="{{ absURL "css/login.css"}}?v=4">
    {{ else }}
    <link rel="stylesheet" href="{{ absURL "css/user.css"}}?v=4">
    {{ end }}
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6365WW8WFY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-6365WW8WFY');
    </script>
</head>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name=robots content="noindex, nofollow">
    <title>{{ T "redirecting_title" | default "正在跳转..." }}</title>
    <link rel="shortcut icon" href="{{ $.Site.Params.images.favicon }}">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="{{ absURL "js/common.js"}}"></script>
</head>

<body>
    {{ T "redirecting_msg" | default "正在跳转，请稍候..." }}
    <script type="text/javascript">
        setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            if (redirect && redirect.includes('ezer.cc')) window.location.href = redirect;
            else window.location.href = "/";
        }, 1000);
    </script>
</body>
